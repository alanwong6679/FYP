        function updateStations() {
            const lineSelect = document.getElementById('line');
            const stationSelect = document.getElementById('station');
            const selectedLine = lineSelect.value;

            // Clear previous options
            stationSelect.innerHTML = '';

            // Populate new options
            if (stationsData[selectedLine]) {
                stationsData[selectedLine].forEach(station => {
                    const option = document.createElement('option');
                    option.value = station.value;
                    option.textContent = station.text;
                    stationSelect.appendChild(option);
                });
            }
        }

        window.onload = function() {
            // Initialize the station dropdown based on the default selected line
            updateStations();
        };

    </ul>
    <h1>Check MTR Schedule</h1>
    <form action="/mtr_schedule" method="post">
        <label for="line">Select Line:</label>
        <select name="line" id="line" required onchange="updateStations()">

        <button type="submit">Get Schedule</button>
    </form>

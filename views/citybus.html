<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Bus Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin: 0 10px;
        }
        .tab.active {
            border-bottom: 2px solid #007bff;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        #suggestions, #startSuggestions, #endSuggestions {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
            z-index: 1000;
            left: 0;
            top: 100%;
        }
        #suggestions div, #startSuggestions div, #endSuggestions div {
            padding: 10px;
            cursor: pointer;
        }
        #suggestions div:hover, #startSuggestions div:hover, #endSuggestions div:hover {
            background-color: #f0f0f0;
        }
        #route, #stationResults {
            margin-top: 20px;
            text-align: left;
        }
        .route-info {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .route-summary {
            cursor: pointer;
            color: #007bff;
            margin: 5px 0;
            font-size: 16px;
        }
        
        .route-details {
            display: none; /* Hidden by default */
            margin-left: 20px;
        }
        
        .boarding-stop {
            color: blue;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        .alighting-stop {
            color: red;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .stop-list {
            list-style-type: none;
            padding: 0;
        }
        .stop-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .clear-button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }
        .clear-button:hover {
            background-color: #e60000;
        }
        .station-search {
            position: relative;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>City Bus Route Planner</h1>
        <div class="tabs">
            <div class="tab active" onclick="showTab('routeSearch')">Route Number Search</div>
            <div class="tab" onclick="showTab('stationSearch')">Station to Station Search</div>
        </div>
        <div id="routeSearch" class="tab-content active">
            <div class="place-container" style="position: relative;">
                <input type="text" id="routeNumber" placeholder="Enter Route Number (e.g., 1)">
                <div id="suggestions"></div>
            </div>
            <button id="routeClearButton" class="clear-button">Clear Search</button>
            <div id="route"></div>
        </div>
        <div id="stationSearch" class="tab-content">
            <div class="station-search">
                <input type="text" id="startStation" placeholder="Start Station (e.g., Tseung Kwan O)">
                <div id="startSuggestions"></div>
            </div>
            <div class="station-search">
                <input type="text" id="endStation" placeholder="End Station (e.g., Kwun Tong)">
                <div id="endSuggestions"></div>
            </div>
            <button onclick="searchStationToStation()">Search Routes</button>
            <button id="stationClearButton" class="clear-button">Clear Search</button>
            <div id="stationResults"></div>
        </div>
    </div>

    <script>
        let allRoutes = [];
        let allStops = [];
        let routeStopsMap = {};
        let currentDirection = 'outbound';
        let selectedStartStop = null;
        let selectedEndStop = null;

        // Fetch all routes
        async function fetchAllRoutes() {
            try {
                const response = await fetch('https://rt.data.gov.hk/v2/transport/citybus/route/CTB');
                const data = await response.json();
                return data.data;
            } catch (error) {
                console.error('Error fetching routes:', error);
                return [];
            }
        }        // Fetch all stops and map them to routes
        async function fetchAllStops() {
            const stopsMap = {};
            const routePromises = allRoutes.map(async route => {
                const directions = ['outbound', 'inbound'];
                for (const direction of directions) {
                    try {
                        const response = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${route.route}/${direction}`);
                        const data = await response.json();
                        if (data.data) {
                            data.data.forEach(stop => {
                                const key = `${route.route}-${direction}`;
                                if (!routeStopsMap[key]) routeStopsMap[key] = [];
                                routeStopsMap[key].push(stop.stop);
                                stopsMap[stop.stop] = stop;
                            });
                        }
                    } catch (error) {
                        console.error(`Error fetching stops for ${route.route} (${direction}):`, error);
                    }
                }
            });
            await Promise.all(routePromises);
            return Object.values(stopsMap);
        }

        // Fetch stop details
        async function fetchStopDetails(stopId) {
            try {
                const response = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${stopId}`);
                const data = await response.json();
                return data.data;
            } catch (error) {
                console.error('Error fetching stop details:', error);
                return null;
            }
        }

        // Initialize data on page load
        async function initializeData() {
            allRoutes = await fetchAllRoutes();
            const rawStops = await fetchAllStops();
            const stopDetailsPromises = rawStops.map(async stop => {
                const details = await fetchStopDetails(stop.stop);
                return {
                    stop: stop.stop,
                    name_en: details ? details.name_en : 'Unknown Stop',
                    lat: details ? details.lat : 0,
                    long: details ? details.long : 0
                };
            });
            allStops = await Promise.all(stopDetailsPromises);
            console.log('Data initialized:', allRoutes, allStops, routeStopsMap);
        }
        document.addEventListener('DOMContentLoaded', initializeData);

        // Tab switching
        function showTab(tabId) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Route Number Search
        document.getElementById('routeNumber').addEventListener('input', function () {
            const input = this.value.trim().toLowerCase();
            const suggestionsDiv = document.getElementById('suggestions');
            if (input && allRoutes.length > 0) {
                const matchingRoutes = allRoutes.filter(route => route.route.toLowerCase().includes(input));
                suggestionsDiv.innerHTML = matchingRoutes.length > 0
                    ? matchingRoutes.map(route => 
                        `<div onclick="selectRoute('${route.route}')">${route.route}</div>`
                      ).join('')
                    : '<div>Loading...</div>';
            } else {
                suggestionsDiv.innerHTML = '';
            }
        });

        async function selectRoute(routeNumber) {
            const routeDiv = document.getElementById('route');
            const suggestionsDiv = document.getElementById('suggestions');
            document.getElementById('routeNumber').value = routeNumber;
            suggestionsDiv.innerHTML = '';
            routeDiv.innerHTML = '<p>Loading...</p>';

            const key = `${routeNumber}-${currentDirection}`;
            const stops = routeStopsMap[key] || [];
            if (stops.length === 0) {
                routeDiv.innerHTML = '<p>No stops found for this route.</p>';
                return;
            }

            const stopDetails = await Promise.all(stops.map(async stopId => {
                const detail = await fetchStopDetails(stopId);
                return detail ? detail.name_en : 'Unknown Stop';
            }));

            routeDiv.innerHTML = `
                <div class="route-info">
                    <strong>Route ${routeNumber} (${currentDirection})</strong>
                    <ul class="stop-list">${stopDetails.map(name => `<li>${name}</li>`).join('')}</ul>
                </div>
            `;
            document.getElementById('routeClearButton').style.display = 'block';
        }

        document.getElementById('routeClearButton').addEventListener('click', () => {
            document.getElementById('routeNumber').value = '';
            document.getElementById('suggestions').innerHTML = '';
            document.getElementById('route').innerHTML = '';
            document.getElementById('routeClearButton').style.display = 'none';
        });

        // Haversine distance formula
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Find nearby stops
        function findNearbyStops(targetStop) {
            return allStops.filter(stop => {
                const distance = haversineDistance(targetStop.lat, targetStop.long, stop.lat, stop.long);
                return distance <= 500;
            });
        }

        // Station to Station Search
        document.getElementById('startStation').addEventListener('input', function () {
            const input = this.value.trim().toLowerCase();
            const suggestionsDiv = document.getElementById('startSuggestions');
            if (input) {
                const matchingStops = allStops.filter(stop => stop.name_en.toLowerCase().includes(input));
                suggestionsDiv.innerHTML = matchingStops.length > 0
                    ? matchingStops.map(stop => `<div onclick="selectStation('start', '${stop.stop}', '${stop.name_en}')">${stop.name_en}</div>`).join('')
                    : '<div>No matching stops</div>';
            } else {
                suggestionsDiv.innerHTML = '';
            }
        });

        document.getElementById('endStation').addEventListener('input', function () {
            const input = this.value.trim().toLowerCase();
            const suggestionsDiv = document.getElementById('endSuggestions');
            if (input) {
                const matchingStops = allStops.filter(stop => stop.name_en.toLowerCase().includes(input));
                suggestionsDiv.innerHTML = matchingStops.length > 0
                    ? matchingStops.map(stop => `<div onclick="selectStation('end', '${stop.stop}', '${stop.name_en}')">${stop.name_en}</div>`).join('')
                    : '<div>No matching stops</div>';
            } else {
                suggestionsDiv.innerHTML = '';
            }
        });

        function selectStation(type, stopId, stopName) {
            if (type === 'start') {
                selectedStartStop = allStops.find(stop => stop.stop === stopId);
                document.getElementById('startStation').value = stopName;
                document.getElementById('startSuggestions').innerHTML = '';
            } else {
                selectedEndStop = allStops.find(stop => stop.stop === stopId);
                document.getElementById('endStation').value = stopName;
                document.getElementById('endSuggestions').innerHTML = '';
            }
        }

        async function searchStationToStation() {
            const resultsDiv = document.getElementById('stationResults');
            resultsDiv.innerHTML = '<p>Loading...</p>';
        
            if (!selectedStartStop || !selectedEndStop) {
                resultsDiv.innerHTML = '<p style="color: red;">Please select both start and end stations.</p>';
                return;
            }
        
            const startStops = findNearbyStops(selectedStartStop);
            const endStops = findNearbyStops(selectedEndStop);
            const startStopIds = startStops.map(s => s.stop);
            const endStopIds = endStops.map(s => s.stop);
        
            // Direct routes
            const directRoutes = [];
            for (const route of allRoutes) {
                const routeId = route.route;
                const directions = ['outbound', 'inbound'];
                for (const direction of directions) {
                    const key = `${routeId}-${direction}`;
                    const stops = routeStopsMap[key] || [];
                    const startMatches = stops.filter(id => startStopIds.includes(id));
                    const endMatches = stops.filter(id => endStopIds.includes(id));
                    if (startMatches.length > 0 && endMatches.length > 0) {
                        const firstStartIndex = Math.min(...startMatches.map(id => stops.indexOf(id)));
                        const lastEndIndex = Math.max(...endMatches.map(id => stops.indexOf(id)));
                        if (firstStartIndex < lastEndIndex) {
                            const relevantStops = stops.slice(firstStartIndex, lastEndIndex + 1);
                            const stopDetails = await Promise.all(relevantStops.map(async id => {
                                const detail = await fetchStopDetails(id);
                                return detail ? detail.name_en : 'Unknown Stop';
                            }));
                            directRoutes.push({ route: routeId, direction, stops: stopDetails });
                        }
                    }
                }
            }
        
            // Interchange routes
            const interchangeRoutes = [];
            if (directRoutes.length === 0) {
                for (const startRoute of allRoutes) {
                    for (const endRoute of allRoutes) {
                        if (startRoute.route === endRoute.route) continue;
                        const startDirections = ['outbound', 'inbound'];
                        const endDirections = ['outbound', 'inbound'];
                        for (const startDir of startDirections) {
                            for (const endDir of endDirections) {
                                const startKey = `${startRoute.route}-${startDir}`;
                                const endKey = `${endRoute.route}-${endDir}`;
                                const startStopsList = routeStopsMap[startKey] || [];
                                const endStopsList = routeStopsMap[endKey] || [];
                                const commonStops = startStopsList.filter(id => endStopsList.includes(id));
                                if (commonStops.length > 0) {
                                    for (const interchangeStop of commonStops) {
                                        const startIndex = startStopsList.indexOf(interchangeStop);
                                        const endIndex = endStopsList.indexOf(interchangeStop);
                                        const startMatches = startStopIds.filter(id => startStopsList.indexOf(id) < startIndex);
                                        const endMatches = endStopIds.filter(id => endStopsList.indexOf(id) > endIndex);
                                        if (startMatches.length > 0 && endMatches.length > 0) {
                                            const firstStartIndex = Math.min(...startMatches.map(id => startStopsList.indexOf(id)));
                                            const lastEndIndex = Math.max(...endMatches.map(id => endStopsList.indexOf(id)));
                                            const startLegStops = startStopsList.slice(firstStartIndex, startIndex + 1);
                                            const endLegStops = endStopsList.slice(endIndex, lastEndIndex + 1);
                                            const startLegDetails = await Promise.all(startLegStops.map(async id => {
                                                const detail = await fetchStopDetails(id);
                                                return detail ? detail.name_en : 'Unknown Stop';
                                            }));
                                            const endLegDetails = await Promise.all(endLegStops.map(async id => {
                                                const detail = await fetchStopDetails(id);
                                                return detail ? detail.name_en : 'Unknown Stop';
                                            }));
                                            interchangeRoutes.push({
                                                legs: [
                                                    { route: startRoute.route, direction: startDir, stops: startLegDetails },
                                                    { route: endRoute.route, direction: endDir, stops: endLegDetails }
                                                ],
                                                interchange: await fetchStopDetails(interchangeStop).then(d => d ? d.name_en : 'Unknown Stop')
                                            });
                                            break; // Limit to one interchange for simplicity
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        
            // Render results
            resultsDiv.innerHTML = '';
            if (directRoutes.length > 0) {
                resultsDiv.innerHTML += '<h3>Direct Routes</h3>' + renderRoutes(directRoutes, 'direct');
            }
            if (interchangeRoutes.length > 0) {
                resultsDiv.innerHTML += '<h3>Interchange Routes</h3>' + renderRoutes(interchangeRoutes, 'interchange');
            }
            if (!directRoutes.length && !interchangeRoutes.length) {
                resultsDiv.innerHTML = '<p>No routes found. Try different stations.</p>';
            }
            document.getElementById('stationClearButton').style.display = 'block';
        }
        function renderRoutes(routes, type) {
            return routes.map((routeObj, index) => {
                const summaryId = `${type}-summary-${index}`;
                const detailsId = `${type}-details-${index}`;
                const isInterchange = routeObj.legs !== undefined;
                const summaryText = isInterchange 
                    ? `${routeObj.legs[0].route} (${routeObj.legs[0].direction}) > ${routeObj.legs[1].route} (${routeObj.legs[1].direction})`
                    : `${routeObj.route} (${routeObj.direction})`;
        
                let html = `<div class="route-summary" id="${summaryId}" onclick="toggleRouteDetails('${detailsId}')">${summaryText}</div>`;
                html += `<div class="route-details" id="${detailsId}">`;
                
                if (isInterchange) {
                    html += `<p>First Leg (to ${routeObj.interchange}):</p>`;
                    html += '<ul class="stop-list">';
                    routeObj.legs[0].stops.forEach((stop, i) => {
                        const className = i === 0 ? 'boarding-stop' : (stop === routeObj.interchange ? 'alighting-stop' : '');
                        html += `<li class="${className}">${stop}</li>`;
                    });
                    html += '</ul>';
                    html += `<p>Second Leg (from ${routeObj.interchange}):</p>`;
                    html += '<ul class="stop-list">';
                    routeObj.legs[1].stops.forEach((stop, i) => {
                        const className = stop === routeObj.interchange ? 'boarding-stop' : (i === routeObj.legs[1].stops.length - 1 ? 'alighting-stop' : '');
                        html += `<li class="${className}">${stop}</li>`;
                    });
                    html += '</ul>';
                } else {
                    html += '<ul class="stop-list">';
                    routeObj.stops.forEach((stop, i) => {
                        const className = i === 0 ? 'boarding-stop' : (i === routeObj.stops.length - 1 ? 'alighting-stop' : '');
                        html += `<li class="${className}">${stop}</li>`;
                    });
                    html += '</ul>';
                }
                html += '</div>';
                return html;
            }).join('');
        }
        
        function toggleRouteDetails(detailsId) {
            const detailsDiv = document.getElementById(detailsId);
            detailsDiv.style.display = detailsDiv.style.display === 'block' ? 'none' : 'block';
        }
        document.getElementById('stationClearButton').addEventListener('click', () => {
            document.getElementById('startStation').value = '';
            document.getElementById('endStation').value = '';
            document.getElementById('startSuggestions').innerHTML = '';
            document.getElementById('endSuggestions').innerHTML = '';
            document.getElementById('stationResults').innerHTML = '';
            document.getElementById('stationClearButton').style.display = 'none';
            selectedStartStop = null;
            selectedEndStop = null;
            document.getElementById('startStation').focus();
        });
    </script>
</body>
</html>
